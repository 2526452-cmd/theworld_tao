<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字世界編輯器</title>
    <style>
        :root {
            --bg-color: #2b2b2b;       
            --grid-bg: #000000;        
            --grid-line: #1a4040;      
            --text-color: #cccccc;     
            --border-color: #555555;   
            
            --human-color: #ffffff;    
            --elf-color: #88ff88;   
            --dwarf-color: #ffaa44; 
            --dragon-color: #ff4444;
            --demon-color: #d900ff; /* 惡魔專屬顏色 */
            --fire-color: #ff5500;  
            --meteor-color: #ffaa00;
            --nuke-color: #33ff33;  
            --plague-color: #cc55ff;
            --weapon-color: #00ffff;   
            
            --cat-color: #ffbba0;   
            --penguin-color: #e0e0e0;
            --sealion-color: #c08050;
            --seal-color: #a0c0d0;  
            
            --pet-color: #ff99cc; 
            
            --boss-color: #ff0055;  
            --river-color: #44aaff;
            --rain-color: #55bbff;
            --snow-color: #ffffff;
            --expand-color: #aaffaa;
            --custom-color: #ff00ff;
            --speed-color: #ffff00;
            --love-color: #ff66b2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'PMingLiU', 'MingLiU', 'Microsoft JhengHei', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            box-sizing: border-box;
            user-select: none;
            overflow: hidden; 
        }

        h1 {
            width: 100%;
            background-color: #d4d4d4;
            color: #000;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            padding: 4px 10px;
            border-bottom: 2px solid #000;
            box-sizing: border-box;
            font-family: sans-serif;
            display: flex;
            justify-content: space-between;
        }

        .title-hints { font-weight: normal; font-size: 12px; color: #555; }

        .control-panel {
            display: flex; flex-direction: column; gap: 5px; margin-top: 5px; padding: 10px;
            background-color: #1e1e1e; border: 1px solid var(--border-color); width: 98vw; box-sizing: border-box;
        }

        .controls { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-start; }

        button {
            background: #000; color: #ddd; border: 1px solid #666; padding: 4px 8px;
            font-family: inherit; font-size: 14px; cursor: pointer; transition: background 0.1s;
            display: flex; align-items: center; gap: 5px;
        }

        button:hover, button.active-key { background: #444; color: #fff; border-color: #999; }

        .hotkey { color: #888; font-family: sans-serif; font-size: 11px; background: #222; padding: 1px 4px; border-radius: 2px; border: 1px solid #444; }

        button.btn-human { border-left: 4px solid var(--human-color); }
        button.btn-elf { border-left: 4px solid var(--elf-color); }
        button.btn-dwarf { border-left: 4px solid var(--dwarf-color); }
        button.btn-dragon { border-left: 4px solid var(--dragon-color); }
        button.btn-demon { border-left: 4px solid var(--demon-color); color: var(--demon-color); font-weight: bold; background-color: #1a001a; }
        button.btn-demon:hover { background-color: #330033; }
        button.btn-pet { border-left: 4px solid var(--pet-color); }
        button.btn-fire { border-left: 4px solid var(--fire-color); }
        button.btn-meteor { border-left: 4px solid var(--meteor-color); }
        button.btn-nuke { border-left: 4px solid var(--nuke-color); }
        button.btn-plague { border-left: 4px solid var(--plague-color); }
        button.btn-weapon { border-left: 4px solid var(--weapon-color); }
        button.btn-boss { border-left: 4px solid var(--boss-color); color: var(--boss-color); }
        button.btn-river { border-left: 4px solid var(--river-color); }
        button.btn-rain { border-left: 4px solid var(--rain-color); }
        button.btn-snow { border-left: 4px solid var(--snow-color); }
        button.btn-expand { border-left: 4px solid var(--expand-color); }
        button.btn-custom { border-left: 4px solid var(--custom-color); color: var(--custom-color); font-weight: bold; }
        button.btn-speed { border-left: 4px solid var(--speed-color); color: var(--speed-color); }
        button.btn-love { border-left: 4px solid var(--love-color); color: var(--love-color); font-weight: bold; background-color: #1a0011; }
        button.btn-love:hover { background-color: #330022; }

        button.btn-speed.fast { background-color: #333300; color: #ffff88; }
        button.btn-berserk { border-left: 4px solid #ff0000; }
        button.btn-berserk.berserk-on { background-color: #440000; color: #ff8888; border-color: #ff0000; }
        button.audio-on { color: #88ff88; border-left: 4px solid #88ff88; }

        #world-container {
            background: var(--grid-bg); width: 98vw; max-width: 1600px; flex: 1; min-height: 0; 
            display: flex; justify-content: center; align-items: center; margin-top: 10px;
            border: 2px solid #555; box-sizing: border-box; padding: 0; position: relative;
            transition: box-shadow 0.4s ease-out; 
        }

        #world {
            display: grid; width: 100%; height: 100%;
            border-top: 1px solid var(--grid-line); border-left: 1px solid var(--grid-line);
        }

        .cell {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: clamp(8px, 1.8vmin, 20px); border-right: 1px solid var(--grid-line); border-bottom: 1px solid var(--grid-line);
            box-sizing: border-box; position: relative; overflow: hidden; white-space: nowrap; text-overflow: clip;
        }

        .king-crown::after {
            content: '👑';
            position: absolute;
            top: -8px;
            font-size: 8px;
            text-shadow: 0 0 2px #000;
        }

        #stats {
            display: flex; gap: 15px; margin: 5px 0; font-size: 14px; color: #ccc;
            background: #1e1e1e; padding: 5px 15px; border: 1px solid #555; width: 98vw; box-sizing: border-box; max-width: 1600px;
        }

        #log-container {
            width: 98vw; max-width: 1600px; border: 1px solid #555; padding: 5px 10px; height: 100px;
            background: #000; margin-bottom: 5px; position: relative; box-sizing: border-box; overflow: hidden;
        }

        #log-container::before {
            content: "Terminal / 世界頻道"; position: absolute; top: 0; right: 0; background: #555; color: #000;
            padding: 0 5px; font-size: 12px; font-family: sans-serif;
        }

        #log { display: flex; flex-direction: column; justify-content: flex-end; height: 100%; font-size: 13px; line-height: 1.4; }
        .log-entry { opacity: 0.8; }
        .log-entry:last-child { opacity: 1; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.3); }

        #custom-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 1000; display: none; justify-content: center; align-items: center;
        }
        .custom-modal { background: #222; border: 2px solid var(--custom-color); padding: 20px; color: #ccc; font-family: sans-serif; width: 340px; border-radius: 5px; }
        .custom-modal h2 { margin-top: 0; color: #fff; font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .form-group { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .form-group label { font-size: 14px; color: #ddd; }
        .form-group input, .form-group select { background: #111; color: #fff; border: 1px solid #555; padding: 4px 6px; width: 130px; font-family: inherit; font-size: 14px; }
        .form-group input[type="color"] { padding: 0; width: 60px; height: 26px; cursor: pointer; }
        .form-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-submit { background: #330033; border: 1px solid var(--custom-color); color: #fff; cursor: pointer;}
        .btn-cancel { background: #333; border: 1px solid #666; color: #ccc; cursor: pointer;}

        #love-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(255, 102, 178, 0.1); pointer-events: none; z-index: 50; display: none; box-shadow: inset 0 0 150px 30px rgba(255, 102, 178, 0.3); }
        #scream-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: clamp(24px, 5vw, 45px); color: #ff1111; font-weight: 900; text-shadow: 0 0 20px #ff0000, 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; pointer-events: none; z-index: 1000; opacity: 0; text-align: center; white-space: nowrap; }

        @keyframes shakeScreen { 0%, 100% { margin-left: 0; margin-top: 0; } 20% { margin-left: -8px; margin-top: 6px; transform: translate(-50%, -50%) rotate(-2deg); } 40% { margin-left: 8px; margin-top: -6px; transform: translate(-50%, -50%) rotate(2deg); } 60% { margin-left: -6px; margin-top: -8px; transform: translate(-50%, -50%) rotate(-1deg); } 80% { margin-left: 6px; margin-top: 8px; transform: translate(-50%, -50%) rotate(1deg); } }
        @keyframes fadeOutScream { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); } 10% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 15% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 80% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); display: none; } }

        #extinction-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #030000; z-index: 9999; display: none; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        #why-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; color: #cc0000; font-size: 4.5vh; line-height: 5vh; font-weight: 900; word-break: break-all; text-align: justify; margin: 0; padding: 0; opacity: 0.9; text-shadow: 2px 2px 0px #440000, -1px -1px 0px #000; animation: whyGlitch 0.1s infinite; }
        @keyframes whyGlitch { 0% { transform: translate(0, 0); } 25% { transform: translate(-2px, 2px); color: #ff1111; } 50% { transform: translate(2px, -2px); color: #990000; } 75% { transform: translate(-2px, -2px); text-shadow: none; } 100% { transform: translate(2px, 2px); } }
        .blood-vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 200px 50px rgba(255,0,0,0.9); pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

    <h1>
        <span>= 文字世界編輯器 v3.2 (惡魔降臨) =</span>
        <span class="title-hints">新增: 惡魔無差別攻擊、範圍技與嗜血狂暴狀態</span>
    </h1>

    <div id="world-container">
        <div id="world"></div>
        <div id="scream-overlay"></div>
    </div>

    <div id="stats">
        <span id="stat-human" style="color: var(--human-color)">人: 0</span>
        <span id="stat-elf" style="color: var(--elf-color)">精: 0</span>
        <span id="stat-dwarf" style="color: var(--dwarf-color)">矮: 0</span>
        <span id="stat-dragon" style="color: var(--dragon-color)">龍: 0</span>
        <span id="stat-demon" style="color: var(--demon-color); font-weight: bold;">魔: 0</span>
        <span id="stat-wild" style="color: #aaaaaa">野: 0</span>
        <span id="stat-custom" style="color: var(--custom-color)">自: 0</span>
        <span id="stat-size" style="color: var(--expand-color); margin-left: auto;">地圖: 35x18</span>
    </div>

    <div id="log-container">
        <div id="log"></div>
    </div>

    <div class="control-panel">
        <div class="controls">
            <button class="btn-human" id="btn-1" onclick="spawnEntity('HUMAN')"><span class="hotkey">1</span> 新增人類</button>
            <button class="btn-elf" id="btn-2" onclick="spawnEntity('ELF')"><span class="hotkey">2</span> 新增精靈</button>
            <button class="btn-dwarf" id="btn-3" onclick="spawnEntity('DWARF')"><span class="hotkey">3</span> 新增矮人</button>
            <button class="btn-dragon" id="btn-4" onclick="spawnEntity('DRAGON')"><span class="hotkey">4</span> 新增龍族</button>
            <button class="btn-demon" id="btn-5" onclick="spawnDemon()"><span class="hotkey">5</span> 新增惡魔</button>
            <button class="btn-custom" id="btn-u" onclick="openCustomModal()"><span class="hotkey">U</span> 創造角色</button>
            <button class="btn-love" id="btn-l" onclick="triggerLove()"><span class="hotkey">L</span> 散播愛情</button>
        </div>
        <div class="controls">
            <button class="btn-pet" id="btn-q" onclick="spawnRandomSuperNeutral()"><span class="hotkey">Q</span> 隨機萌獸</button>
            <button class="btn-fire" id="btn-a" onclick="triggerDisaster('FIRE')"><span class="hotkey">A</span> 執行火焰</button>
            <button class="btn-meteor" id="btn-s" onclick="triggerDisaster('METEOR')"><span class="hotkey">S</span> 執行隕石</button>
            <button class="btn-nuke" id="btn-d" onclick="triggerDisaster('NUKE')"><span class="hotkey">D</span> 執行核彈</button>
            <button class="btn-plague" id="btn-f" onclick="triggerDisaster('PLAGUE')"><span class="hotkey">F</span> 執行瘟疫</button>
            <button class="btn-weapon" id="btn-g" onclick="spawnWeapons()"><span class="hotkey">G</span> 生成武器</button>
            <button class="btn-speed" id="btn-p" onclick="toggleSpeed()"><span class="hotkey">P</span> 速度: 1x</button>
        </div>
        <div class="controls">
            <button class="btn-boss" id="btn-z" onclick="spawnBoss('CHAIN_DRAGON')"><span class="hotkey">Z</span> 召喚鎖刃龍</button>
            <button class="btn-river" id="btn-c" onclick="spawnRiver()"><span class="hotkey">C</span> 生成河流</button>
            <button class="btn-rain" id="btn-b" onclick="triggerWeather('RAIN')"><span class="hotkey">B</span> 降雨</button>
            <button class="btn-snow" id="btn-n" onclick="triggerWeather('SNOW')"><span class="hotkey">N</span> 降雪</button>
            <button class="btn-expand" id="btn-m" onclick="expandMap()"><span class="hotkey">M</span> 擴大地圖</button>
            <button class="btn-berserk" id="btn-v" onclick="toggleBerserk()"><span class="hotkey">V</span> 狂暴: 關閉</button>
            <button id="btn-x" class="audio-on" onclick="toggleAudio()"><span class="hotkey">X</span> 音效: 開啟</button>
        </div>
    </div>

    <!-- 自創角色彈出視窗 -->
    <div id="custom-modal-overlay">
        <div class="custom-modal">
            <h2>✨ 創造自訂角色</h2>
            <div class="form-group">
                <label>角色圖示</label>
                <input type="text" id="c-name" value="神" maxlength="4">
            </div>
            <div class="form-group">
                <label>初始體力</label>
                <input type="number" id="c-hp" value="10" min="1">
            </div>
            <div class="form-group">
                <label>額外攻擊力</label>
                <input type="number" id="c-dmg" value="100" min="0">
            </div>
            <div class="form-group">
                <label>攜帶武器</label>
                <select id="c-weapon">
                    <option value="NONE">無</option>
                    <option value="SWORD">劍 (+1)</option>
                    <option value="GREATSWORD">大劍 (+2)</option>
                    <option value="CHAIN_BLADE">真·鎖刃 (+4)</option>
                </select>
            </div>
            <div class="form-group">
                <label>顯示顏色</label>
                <input type="color" id="c-color" value="#ff00ff">
            </div>
            <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
            <div class="form-group">
                <label>偏向種族</label>
                <select id="c-faction">
                    <option value="HUMAN">人類</option>
                    <option value="ELF">精靈</option>
                    <option value="DWARF">矮人</option>
                    <option value="DRAGON">龍族</option>
                    <option value="NONE" selected>無</option>
                </select>
            </div>
            <div class="form-group">
                <label>繁衍同類?</label>
                <input type="checkbox" id="c-breed" checked>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeCustomModal()">取消</button>
                <button class="btn-submit" onclick="submitCustomCharacter()">創造降臨</button>
            </div>
        </div>
    </div>

    <div id="extinction-overlay">
        <div class="blood-vignette"></div>
        <div id="why-container"></div>
    </div>
    
    <div id="love-overlay"></div>

    <script>
        document.addEventListener('keydown', (event) => {
            if(document.getElementById('custom-modal-overlay').style.display === 'flex') return;
            const key = event.key.toLowerCase();
            let buttonId = null;

            switch(key) {
                case '1': spawnEntity('HUMAN'); buttonId = 'btn-1'; break;
                case '2': spawnEntity('ELF'); buttonId = 'btn-2'; break;
                case '3': spawnEntity('DWARF'); buttonId = 'btn-3'; break;
                case '4': spawnEntity('DRAGON'); buttonId = 'btn-4'; break;
                case '5': spawnDemon(); buttonId = 'btn-5'; break;
                case 'u': openCustomModal(); buttonId = 'btn-u'; break;
                case 'l': triggerLove(); buttonId = 'btn-l'; break; 
                case 'q': spawnRandomSuperNeutral(); buttonId = 'btn-q'; break;
                case 'a': triggerDisaster('FIRE'); buttonId = 'btn-a'; break;
                case 's': triggerDisaster('METEOR'); buttonId = 'btn-s'; break;
                case 'd': triggerDisaster('NUKE'); buttonId = 'btn-d'; break;
                case 'f': triggerDisaster('PLAGUE'); buttonId = 'btn-f'; break;
                case 'g': spawnWeapons(); buttonId = 'btn-g'; break;
                case 'z': spawnBoss('CHAIN_DRAGON'); buttonId = 'btn-z'; break;
                case 'c': spawnRiver(); buttonId = 'btn-c'; break;
                case 'b': triggerWeather('RAIN'); buttonId = 'btn-b'; break;
                case 'n': triggerWeather('SNOW'); buttonId = 'btn-n'; break;
                case 'm': expandMap(); buttonId = 'btn-m'; break;
                case 'v': toggleBerserk(); buttonId = 'btn-v'; break;
                case 'x': toggleAudio(); buttonId = 'btn-x'; break;
                case 'p': toggleSpeed(); buttonId = 'btn-p'; break;
            }

            if (buttonId) {
                const btn = document.getElementById(buttonId);
                if (btn) { btn.classList.add('active-key'); setTimeout(() => btn.classList.remove('active-key'), 150); }
            }
        });

        let WORLD_WIDTH = 35; let WORLD_HEIGHT = 18;
        let MAX_BUILDINGS_PER_RACE = 2; 

        const BASE_TICK_RATE = 800; 
        let currentTickRate = BASE_TICK_RATE;
        let currentSpeed = 1; let worldInterval = null;

        const NATION_THRESHOLD = 12; 
        const COLLAPSE_THRESHOLD = 4; 

        const WEAPON_TYPES = [
            { id: 'SWORD', name: '劍', char: '劍', color: '#cccccc', bonus: 1 },
            { id: 'SPEAR', name: '長槍', char: '槍', color: '#aaccaa', bonus: 1 },
            { id: 'GREATSWORD', name: '大劍', char: '斬', color: '#ffaaaa', bonus: 2 } 
        ];

        const RACES = {
            HUMAN:  { id: 'HUMAN',  name: '人類', stages: ['人', '兵', '將', '王'], color: 'var(--human-color)', buildingChar: '城', buildingColor: '#aaaaaa', nationBg: 'rgba(255, 255, 255, 0.15)' },
            ELF:    { id: 'ELF',    name: '精靈', stages: ['精', '靈', '賢', '聖'], color: 'var(--elf-color)', buildingChar: '樹', buildingColor: '#66aa66', nationBg: 'rgba(136, 255, 136, 0.15)' },
            DWARF:  { id: 'DWARF',  name: '矮人', stages: ['矮', '匠', '鋼', '鑽'], color: 'var(--dwarf-color)', buildingChar: '堡', buildingColor: '#886644', nationBg: 'rgba(255, 170, 68, 0.15)' },
            DRAGON: { id: 'DRAGON', name: '龍族', stages: ['龍', '魔', '霸', '祖'], color: 'var(--dragon-color)', buildingChar: '巢', buildingColor: '#aa4444', nationBg: 'rgba(255, 68, 68, 0.15)' }
        };

        const NEUTRALS = { SLIME: { id: 'SLIME', name: '史萊姆', stages: ['史'], color: '#55ccaa' }, BEAST: { id: 'BEAST', name: '野獸', stages: ['獸'], color: '#aa8855' } };
        const SUPER_NEUTRALS = { CAT: { id: 'CAT', name: '貓咪', stages: ['貓'], color: 'var(--cat-color)' }, PENGUIN: { id: 'PENGUIN', name: '企鵝', stages: ['企'], color: 'var(--penguin-color)' }, SEALION: { id: 'SEALION', name: '海獅', stages: ['獅'], color: 'var(--sealion-color)' }, SEAL: { id: 'SEAL', name: '海豹', stages: ['豹'], color: 'var(--seal-color)' } };
        const BOSSES = { CHAIN_DRAGON: { id: 'CHAIN_DRAGON', name: '鎖刃龍', stages: ['鎖'], color: 'var(--boss-color)' } };
        const DISASTERS = { FIRE: { name: '火焰', radius: 2, char: '炎', color: 'var(--fire-color)' }, METEOR: { name: '隕石', radius: 5, char: '隕', color: 'var(--meteor-color)' }, NUKE: { name: '核彈', radius: 15, char: '核', color: 'var(--nuke-color)' }, PLAGUE: { name: '瘟疫', radius: 4, char: '毒', color: 'var(--plague-color)' } };

        const EMPTY_CHAR = '';

        let entities = []; let domGrid = []; let logs = []; let effects = []; 
        let buildings = []; let items = []; let rivers = [];
        let activeNations = {}; 
        
        let isPlagueActive = false; let plagueCapacity = 0; let isBerserkMode = false;
        let currentWeather = 'NONE'; let weatherTimer = 0; let loveTimer = 0; 
        let worldEverHadLife = false; let extinctionInProgress = false; 

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function triggerLove() {
            if (entities.length > (WORLD_WIDTH * WORLD_HEIGHT * 0.8)) { addLog("系統", "世界太擁擠了，已經沒有空間容納新的愛情...", "#aaaaaa"); return; }
            loveTimer = 25; 
            if (isBerserkMode) toggleBerserk();
            document.getElementById('love-overlay').style.display = 'block';

                        activeNations[raceId] = { name: nationName, kingId: newKing.id };
                    }
                    
                    addLog("建國", `👑 【${members[0].race.name}】建立了【${nationName}】，並設立了皇都！`, members[0].race.color);
                    playSfx('boss');
                } else if (activeNations[raceId]) {
                    if (members.length <= COLLAPSE_THRESHOLD) {
                        addLog("滅亡", `💀 【${activeNations[raceId].name}】人口凋零，國家正式崩潰滅亡...`, "#888888");
                        delete activeNations[raceId];
                        members.forEach(m => m.isKing = false);
                        buildings.filter(b => b.race.id === raceId).forEach(b => {
                            if (b.isCapital) { b.isCapital = false; b.hp = Math.min(b.hp, 4); }
                        });
                    } else {
                        let king = members.find(m => m.id === activeNations[raceId].kingId);
                        if (!king || toRemove.has(king.id) || king.hp <= 0) {
                            let aliveMembers = members.filter(m => !toRemove.has(m.id) && m.id !== activeNations[raceId].kingId);
                            if (aliveMembers.length > 0) {
                                let newKing = aliveMembers.sort((a,b) => b.level - a.level)[0];
                                newKing.isKing = true; newKing.level = 3; newKing.hp = Math.max(newKing.hp, 10);
                                activeNations[raceId].kingId = newKing.id;
                                addLog("繼承", `👑 【${activeNations[raceId].name}】的新王登基了！`, newKing.race.color);
                            }
                        }
                        
                        let myBuildings = buildings.filter(b => b.race.id === raceId);
                        let capital = myBuildings.find(b => b.id === activeNations[raceId].capitalId);
                        if (!capital && myBuildings.length > 0) {
                            capital = myBuildings[0];
                            capital.isCapital = true;
                            capital.hp = 20;
                            activeNations[raceId].capitalId = capital.id;
                            addLog("遷都", `🏛️ 【${activeNations[raceId].name}】在倖存的據點中重新設立了皇都！`, members[0].race.color);
                        }
                    }
                }
            }

            for (let e of shuffledEntities) {
                if (toRemove.has(e.id)) continue;

                // 惡魔狂暴計算
                if (e.isDemon) {
                    e.timeSinceLastAttack++;
                    if (e.timeSinceLastAttack > 15 && !e.isFrenzied) {
                        e.isFrenzied = true;
                        addLog("發狂", `💢 【惡魔】因為找不到獵物，陷入了狂暴加速狀態！`, "var(--demon-color)");
                    }
                }
                
                if (e.isInfected) {
                    activeInfections++;
                    if (Math.random() < 0.08) { if (applyDamage(e, 1)) { toRemove.add(e.id); plagueCapacity--; if (plagueCapacity <= 0) isPlagueActive=false; continue; } }
                    if (isPlagueActive && Math.random() < 0.2) {
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                let neighbor = getEntityAt(e.x + dx, e.y + dy);
                                if (neighbor && !neighbor.isInfected && !toRemove.has(neighbor.id) && !neighbor.isBoss) if (Math.random() < 0.4) neighbor.isInfected = true; 
                            }
                        }
                    }
                }

                if (currentWeather === 'SNOW' && !(e.isBoss || e.race.id === 'PENGUIN' || e.race.id === 'SEAL' || e.race.id === 'SEALION' || (e.isCustom && e.targetFaction === 'ELF')) && Math.random() < 0.5) continue;

                if (!e.isNeutral && !e.isBoss && !e.isDemon && e.level < 3 && !e.isKing) {
                    let evoChance = [0.01, 0.005, 0.001][e.level] || 0;
                    if (Math.random() < evoChance) { e.level++; playSfx('level_up'); }
                }

                let currentMaxBuildings = MAX_BUILDINGS_PER_RACE + (activeNations[e.race.id] ? 2 : 0);
                if (!e.isNeutral && !e.isBoss && !e.isDemon && buildings.filter(b => b.race.id === e.race.id).length < currentMaxBuildings && Math.random() < 0.005 && !getBuildingAt(e.x, e.y) && !getRiverAt(e.x, e.y)) {
                    buildings.push({ race: e.race, x: e.x, y: e.y, hp: 4, id: Math.random().toString(), isCapital: false });
                }

                // 行動迴圈：狂暴惡魔可以行動 2 次
                let actionCount = (e.isDemon && e.isFrenzied) ? 2 : 1;
                for (let act = 0; act < actionCount; act++) {
                    if (toRemove.has(e.id)) break;

                    let dx = Math.floor(Math.random() * 3) - 1; let dy = Math.floor(Math.random() * 3) - 1;
                    
                    if (e.isDemon) {
                        // 惡魔無差別尋找最近的獵物
                        let seekTarget = null; let nearestDist = Infinity;
                        for (let other of entities) {
                            if (other === e || toRemove.has(other.id) || other.isDemon) continue;
                            let dist = Math.abs(e.x - other.x) + Math.abs(e.y - other.y);
                            if (dist < nearestDist) { nearestDist = dist; seekTarget = other; }
                        }
                        if (seekTarget) {
                            dx = seekTarget.x > e.x ? 1 : (seekTarget.x < e.x ? -1 : 0);
                            dy = seekTarget.y > e.y ? 1 : (seekTarget.y < e.y ? -1 : 0);
                        }
                    } else if (e.isKing) {
                        let capital = buildings.find(b => activeNations[e.race.id] && b.id === activeNations[e.race.id].capitalId);
                        if (capital) {
                            if (Math.abs(e.x - capital.x) + Math.abs(e.y - capital.y) > 2) {
                                dx = capital.x > e.x ? 1 : (capital.x < e.x ? -1 : 0);
                                dy = capital.y > e.y ? 1 : (capital.y < e.y ? -1 : 0);
                            } else {
                                if(Math.random() < 0.5) { dx = 0; dy = 0; }
                            }
                        } else {
                            if(Math.random() < 0.5) { dx = 0; dy = 0; }
                        }
                    } else if (!e.isBoss && !e.isSuperNeutral) {
                        let seekTarget = null; let nearestDist = Infinity;
                        let seekAny = loveTimer > 0; let seekKin = !seekAny && Math.random() < 0.65;
                        if (seekAny || seekKin) {
                            for (let other of entities) {
                                if (other === e || toRemove.has(other.id) || other.isBoss || other.isSuperNeutral || other.isDemon) continue;
                                let isSameRace = (other.race.id === e.race.id);
                                if (seekAny || (seekKin && isSameRace)) {
                                    let dist = Math.abs(e.x - other.x) + Math.abs(e.y - other.y);
                                    if (dist < nearestDist) { nearestDist = dist; seekTarget = other; }
                                }
                            }
                        }
                        if (seekTarget && nearestDist > 1) {
                            dx = seekTarget.x > e.x ? 1 : (seekTarget.x < e.x ? -1 : 0);
                            dy = seekTarget.y > e.y ? 1 : (seekTarget.y < e.y ? -1 : 0);
                            if (Math.random() < 0.2) dx = Math.floor(Math.random() * 3) - 1;
                            if (Math.random() < 0.2) dy = Math.floor(Math.random() * 3) - 1;
                        }
                    }

                    let nx = e.x + dx; let ny = e.y + dy;
                    if (nx < 0 || nx >= WORLD_WIDTH || ny < 0 || ny >= WORLD_HEIGHT || (nx===e.x && ny===e.y)) continue;

                    let targetEntity = getEntityAt(nx, ny); let targetBuilding = getBuildingAt(nx, ny);

                    if (!targetEntity) {
                        if (targetBuilding && ((targetBuilding.race.id !== e.race.id && (!e.isNeutral || isBerserkMode)) || e.isDemon)) {
                            targetBuilding.hp -= ((e.race.id === 'DRAGON' || e.level >= 2 || e.isBoss || e.isDemon) ? 3 : 1) + (e.weapon ? e.weapon.bonus : 0) + (e.baseDmg||0);
                            if (e.isDemon) { e.timeSinceLastAttack = 0; e.isFrenzied = false; }
                            if (targetBuilding.hp <= 0) { 
                                if (targetBuilding.isCapital) {
                                    addLog("戰報", `🔥 震驚！【${targetBuilding.race.name}】的皇都遭到摧毀了！`, "#ff4444");
                                }
                                buildings = buildings.filter(b => b.id !== targetBuilding.id); 
                                e.x = nx; e.y = ny; 
                            } 
                        } else { e.x = nx; e.y = ny; }
                    } else if (!toRemove.has(targetEntity.id)) {
                        if (loveTimer > 0 && !e.isBoss && !targetEntity.isBoss && !e.isSuperNeutral && !targetEntity.isSuperNeutral && !e.isDemon && !targetEntity.isDemon) { 
                            handleLove(e, targetEntity); 
                        } else { 
                            handleInteraction(e, targetEntity, toRemove); 
                        }
                    }
                } // End Action Loop
            }

            if (toRemove.size > 0) {
                for (let e of entities) if (toRemove.has(e.id) && e.weapon) items.push({ x: e.x, y: e.y, type: e.weapon, id: Math.random().toString() });
                entities = entities.filter(e => !toRemove.has(e.id)); updateStats();
            }
            
            for (let e of entities) {
                if (!e.weapon && !e.isNeutral && !e.isDemon) {
                    let itemOnGround = getItemAt(e.x, e.y);
                    if (itemOnGround) { e.weapon = itemOnGround.type; items = items.filter(i => i.id !== itemOnGround.id); playSfx('weapon'); }
                }
            }
            if (isPlagueActive && activeInfections === 0 && toRemove.size === 0) isPlagueActive = false;
            
            drawWorld(); checkExtinction(); 
        }

        function handleInteraction(attacker, defender, toRemove) {
            if (attacker.isSuperNeutral || defender.isSuperNeutral) return; 
            
            if (attacker.isBoss || defender.isBoss) {
                let boss = attacker.isBoss ? attacker : defender; let victim = attacker.isBoss ? defender : attacker;
                if (victim.isBoss) return; 
                
                if (attacker.isDemon) { attacker.timeSinceLastAttack = 0; attacker.isFrenzied = false; }
                if (defender.isDemon) { defender.timeSinceLastAttack = 0; defender.isFrenzied = false; }
                
                if (applyDamage(victim, 5)) { toRemove.add(victim.id); playSfx('hit'); if (attacker.isBoss) { attacker.x = defender.x; attacker.y = defender.y; } }
                if (Math.random() < (victim.level * 0.15 + (victim.weapon ? 0.2 : 0.05)) && !toRemove.has(victim.id)) { 
                    if (applyDamage(boss, (victim.weapon ? victim.weapon.bonus : 1) + (victim.baseDmg||0))) { toRemove.add(boss.id); playSfx('hit'); }
                } return;
            }

            // 惡魔攻擊判定
            if (attacker.isDemon || defender.isDemon) {
                if (attacker.isDemon && defender.isDemon) return; // 惡魔互不攻擊
                let demon = attacker.isDemon ? attacker : defender;
                let victim = attacker.isDemon ? defender : attacker;
                
                demon.timeSinceLastAttack = 0; demon.isFrenzied = false;
                
                if (Math.random() < 0.35) { demonAoE(demon, toRemove); }
                
                if (!toRemove.has(victim.id)) { // 如果沒有在 AoE 中死亡
                    if (applyDamage(victim, 4 + (demon.baseDmg||0))) {
                        toRemove.add(victim.id); playSfx('hit');
                        if (attacker.isDemon) { attacker.x = defender.x; attacker.y = defender.y; }
                    }
                } else if (attacker.isDemon) {
                    attacker.x = defender.x; attacker.y = defender.y;
                }
                
                if (!toRemove.has(victim.id) && Math.random() < 0.3) {
                    if (applyDamage(demon, (victim.weapon?victim.weapon.bonus:1) + (victim.baseDmg||0))) {
                        toRemove.add(demon.id); playSfx('hit');
                    }
                }
                return;
            }

            if (isBerserkMode && !attacker.isNeutral) { if (defender.isNeutral) return; } 
            else { if (attacker.race.id === defender.race.id || (attacker.isNeutral && defender.isNeutral)) return; }

            if (attacker.race.id === 'DRAGON') { if (applyDamage(defender, 2)) { toRemove.add(defender.id); attacker.x = defender.x; attacker.y = defender.y; } return; }
            if (defender.race.id === 'DRAGON') { if (applyDamage(attacker, 2)) { toRemove.add(attacker.id); } return; }

            if (Math.random() > 0.5) {
                let winner, loser;
                let advantage = attacker.level - defender.level + (attacker.weapon?attacker.weapon.bonus:0) + (attacker.baseDmg||0) - (defender.weapon?defender.weapon.bonus:0) - (defender.baseDmg||0);
                if (Math.random() > (0.5 - (advantage * 0.15))) { winner = attacker; loser = defender; } else { winner = defender; loser = attacker; }
                
                if (applyDamage(loser, 1 + (winner.baseDmg || 0) + (winner.weapon ? winner.weapon.bonus : 0))) {
                    toRemove.add(loser.id); playSfx('hit');
                    if (winner === attacker) { attacker.x = defender.x; attacker.y = defender.y; }
                }
            }
        }

        function showDeathScream(raceName) {
            const overlay = document.getElementById('scream-overlay'); const container = document.getElementById('world-container');
            const screams = [ `「為什麼要殺死我們【${raceName}】...」`, `「創世神啊...為什麼！？」`, `「好痛...」`, `「不要...」`];
            overlay.innerText = screams[Math.floor(Math.random() * screams.length)]; overlay.style.animation = 'none'; void overlay.offsetWidth; 
            overlay.style.animation = 'shakeScreen 0.05s infinite, fadeOutScream 2.5s forwards';
            container.style.boxShadow = 'inset 0 0 100px 50px rgba(255, 0, 0, 0.7)'; setTimeout(() => { container.style.boxShadow = 'none'; }, 400); playSfx('scream');
        }

        function triggerDisaster(type) {
            const d = DISASTERS[type]; const cx = Math.floor(Math.random() * WORLD_WIDTH); const cy = Math.floor(Math.random() * WORLD_HEIGHT);
            let toRemove = new Set(); let bToRemove = new Set(); let lastKilled = null;

            for (let y = 0; y < WORLD_HEIGHT; y++) {
                for (let x = 0; x < WORLD_WIDTH; x++) {
                    if (Math.hypot(x - cx, y - cy) <= d.radius) {
                        let entity = getEntityAt(x, y);
                        if (entity) {
                            if (type === 'PLAGUE') { if (!entity.isInfected && !entity.isBoss) { entity.isInfected = true; } } 
                            else { if (applyDamage(entity, 2)) { toRemove.add(entity.id); lastKilled = entity; } }
                        }
                        if (type !== 'PLAGUE' && getBuildingAt(x,y)) { 
                            let b = getBuildingAt(x,y); 
                            b.hp-=5; 
                            if(b.hp<=0) {
                                if (b.isCapital) addLog("戰報", `🔥 災難降臨！【${b.race.name}】的皇都遭到摧毀了！`, "#ff4444");
                                bToRemove.add(b.id); 
                            }
                        }
                        effects.push({ x: x, y: y, char: d.char, color: d.color, life: 2 + Math.random() * 3 });
                    }
                }
            }

            if (toRemove.size > 0) {
                for (let e of entities) if (toRemove.has(e.id) && e.weapon) items.push({ x: e.x, y: e.y, type: e.weapon, id: Math.random().toString() });
                entities = entities.filter(e => !toRemove.has(e.id)); updateStats();
            }
            if (bToRemove.size > 0) buildings = buildings.filter(b => !bToRemove.has(b.id));

            if (type === 'PLAGUE') { if (!isPlagueActive) { isPlagueActive = true; plagueCapacity = Math.max(3, Math.floor(entities.length * 0.4)); } playSfx('disaster'); } 
            else { playSfx('disaster'); if (lastKilled && entities.length > 0) setTimeout(() => showDeathScream(lastKilled.race.name), 250); }
            drawWorld(); checkExtinction(); 
        }

        function drawWorld() {
            for (let y = 0; y < WORLD_HEIGHT; y++) {
                for (let x = 0; x < WORLD_WIDTH; x++) {
                    let cell = domGrid[y][x]; cell.innerText = EMPTY_CHAR;
                    cell.style.color = 'var(--text-color)'; cell.style.backgroundColor = 'transparent';
                    cell.style.textDecoration = 'none'; cell.style.outline = 'none'; cell.style.boxShadow = 'none'; cell.style.zIndex = '0';
                    cell.className = 'cell'; cell.style.fontWeight = 'normal'; cell.style.textShadow = 'none';
                }
            }

            for (let b of buildings) {
                if (activeNations[b.race.id]) {
                    let radius = b.isCapital ? 2 : 1;
                    for(let dy=-radius; dy<=radius; dy++){
                        for(let dx=-radius; dx<=radius; dx++){
                            if (radius === 2 && Math.abs(dx) + Math.abs(dy) > 3) continue;
                            let tx = b.x + dx, ty = b.y + dy;
                            if(tx>=0 && tx<WORLD_WIDTH && ty>=0 && ty<WORLD_HEIGHT) {
                                domGrid[ty][tx].style.backgroundColor = b.race.nationBg;
                            }
                        }
                    }
                }
            }

            for (let b of buildings) { 
                let cell = domGrid[b.y][b.x]; 
                if (b.isCapital) {
                    cell.innerText = '都';
                    cell.style.color = '#ffd700'; 
                    cell.style.backgroundColor = '#440000'; 
                    cell.style.outline = `2px solid #ffd700`;
                    cell.style.outlineOffset = '-1px';
                    cell.style.zIndex = '3';
                } else {
                    cell.innerText = b.race.buildingChar; 
                    cell.style.color = b.race.buildingColor; 
                    cell.style.backgroundColor = '#333'; 
                }
            }
            for (let item of items) { let cell = domGrid[item.y][item.x]; cell.innerText = item.type.char; cell.style.color = item.type.color; }

            for (let e of entities) {
                let cell = domGrid[e.y][e.x];
                let charStr = e.race.stages[Math.min(e.level, 3)];
                
                if (isBerserkMode && !e.isNeutral && !e.isBoss) cell.style.backgroundColor = 'rgba(255, 0, 0, 0.25)';
                else if (e.race.id && activeNations[e.race.id] && cell.style.backgroundColor === 'transparent') cell.style.backgroundColor = e.race.nationBg; 
                
                if (e.isBoss) { charStr = e.race.stages[0]; cell.style.outline = `2px solid #ff0`; cell.style.outlineOffset = '-2px'; }
                
                if (e.isDemon && e.isFrenzied) {
                    charStr = '怒';
                    cell.style.textShadow = '0 0 8px #ff0000';
                    cell.style.fontWeight = 'bold';
                }

                cell.style.color = e.race.color;
                if (e.weapon && !e.isBoss && !e.isDemon) { cell.style.textDecoration = 'underline'; cell.style.textDecorationColor = e.weapon.color; }
                if (e.hp === 1 && Math.random() < 0.4 && !e.isBoss && !e.isDemon) { charStr = '危'; cell.style.color = '#ff4444'; } 
                else if (e.isInfected && Math.random() < 0.3) { charStr = '病'; cell.style.color = 'var(--plague-color)'; }
                
                if (e.isKing) {
                    cell.classList.add('king-crown');
                    cell.style.boxShadow = `inset 0 0 5px ${e.race.color}`;
                    cell.style.fontWeight = 'bold';
                    cell.style.zIndex = '5';
                }

                cell.innerText = charStr;
            }

            for (let ef of effects) {
                if (ef.y >= 0 && ef.y < WORLD_HEIGHT && ef.x >= 0 && ef.x < WORLD_WIDTH) {
                    let cell = domGrid[ef.y][ef.x]; cell.innerText = ef.char; cell.style.color = ef.color;
                    if (ef.char !== '+' && ef.char !== '雨' && ef.char !== '滴' && ef.char !== '雪' && ef.char !== '❄' && ef.char !== '♥') {
                        if (ef.char === '爆') cell.style.backgroundColor = 'rgba(217, 0, 255, 0.5)';
                        else cell.style.backgroundColor = 'rgba(100, 0, 0, 0.4)'; 
                    }
                }
            }
        }

        function updateStats() {
            let counts = { HUMAN: 0, ELF: 0, DWARF: 0, DRAGON: 0, DEMON: 0, WILD: 0, CUSTOM: 0 };
            for (let e of entities) { 
                if (e.isCustom) counts.CUSTOM++; 
                else if (e.isDemon) counts.DEMON++;
                else if (e.isNeutral) counts.WILD++; 
                else if (counts[e.race.id] !== undefined) counts[e.race.id]++; 
            }
            
            document.getElementById('stat-human').innerText = `${activeNations['HUMAN'] ? '👑 ' : ''}人: ${counts.HUMAN}`; 
            document.getElementById('stat-elf').innerText = `${activeNations['ELF'] ? '👑 ' : ''}精: ${counts.ELF}`;
            document.getElementById('stat-dwarf').innerText = `${activeNations['DWARF'] ? '👑 ' : ''}矮: ${counts.DWARF}`; 
            document.getElementById('stat-dragon').innerText = `${activeNations['DRAGON'] ? '👑 ' : ''}龍: ${counts.DRAGON}`;
            document.getElementById('stat-demon').innerText = `魔: ${counts.DEMON}`;
            document.getElementById('stat-wild').innerText = `野: ${counts.WILD}`; 
            
            let customHasNation = Object.keys(activeNations).some(id => id.startsWith('CUSTOM_'));
            document.getElementById('stat-custom').innerText = `${customHasNation ? '👑 ' : ''}自: ${counts.CUSTOM}`;
        }

        function addLog(type, message, color = "var(--text-color)") {
            const logEl = document.getElementById('log'); const entry = document.createElement('div'); entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
            entry.innerHTML = `<span style="color:#777">[${time}] ${type} &gt;</span> <span style="color:${color}">${message}</span>`;
            logEl.appendChild(entry); logs.push(entry); if (logs.length > 5) logEl.removeChild(logs.shift()); 
            logEl.scrollTop = logEl.scrollHeight;
        }

        window.onload = initWorld;

    </script>
